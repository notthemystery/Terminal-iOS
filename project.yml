name: Terminal

options:
  bundleIdPrefix: com.Terminal.app

targets:
  MyApp:
    type: application
    platform: iOS
    sources:
      - path: Terminal.swift
      - path: Terminal-Bridging-Header.h
      - path: spawn.h
      - path: spawn.c
      - path: tools

    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.Terminal.app
      IPHONEOS_DEPLOYMENT_TARGET: 15.0
      SWIFT_OBJC_BRIDGING_HEADER: Terminal-Bridging-Header.h

    info:
      path: MyApp/Info.plist
    
