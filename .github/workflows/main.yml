name: iOS Build with tools injection

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout repo
      # ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Prepare tools folder inside build root
      # (THIS IS THE KEY TRICK)
      # ─────────────────────────────
      - name: Prepare tools for bundling
        run: |
          echo "Preparing tools..."
          mkdir -p tools_build
          cp -R tools/* tools_build/
          chmod +x tools_build/* || true

      # ─────────────────────────────
      # 3. Move tools into Xcode expected Resources path
      # BEFORE build (no Xcode edits needed)
      # ─────────────────────────────
      - name: Inject tools into build resources
        run: |
          mkdir -p MyApp/tools
          cp -R tools_build/* MyApp/tools/

      # ─────────────────────────────
      # 4. Select Xcode
      # ─────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ─────────────────────────────
      # 5. Build app
      # ─────────────────────────────
      - name: Build iOS App
        run: |
          xcodebuild \
            -scheme MyApp \
            -sdk iphoneos \
            -configuration Release \
            -destination generic/platform=iOS \
            clean build

      # ─────────────────────────────
      # 6. Archive
      # ─────────────────────────────
      - name: Archive
        run: |
          xcodebuild \
            -scheme MyApp \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/MyApp.xcarchive \
            archive

      # ─────────────────────────────
      # 7. Export IPA
      # ─────────────────────────────
      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/MyApp.xcarchive \
            -exportPath build \
            -exportOptionsPlist ExportOptions.plist

      # ─────────────────────────────
      # 8. Verify tools exist in bundle
      # ─────────────────────────────
      - name: Verify tools
        run: |
          find build -name tools || echo "tools not found"

      # ─────────────────────────────
      # 9. Upload artifact
      # ─────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-shell
          path: build/
