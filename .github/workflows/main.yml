name: iOS Shell App CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # ─────────────────────────────
      # 1. Checkout code
      # ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─────────────────────────────
      # 2. Install XcodeGen
      # ─────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ─────────────────────────────
      # 3. Generate Xcode project
      # ─────────────────────────────
      - name: Generate Xcode project
        run: xcodegen generate

      # ─────────────────────────────
      # 4. Show generated project (debug)
      # ─────────────────────────────
      - name: Verify project
        run: ls -R .

      # ─────────────────────────────
      # 5. Select Xcode
      # ─────────────────────────────
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      # ─────────────────────────────
      # 6. Build app
      # ─────────────────────────────
      - name: Build iOS App
        run: |
          chmod +x Build.sh
          ./Build.sh
      
      # ─────────────────────────────
      # 9. Verify tools are included
      # ─────────────────────────────
      - name: Check tools in bundle
        run: |
          find build -name tools || echo "tools not found"

      # ─────────────────────────────
      # 10. Upload artifact
      # ─────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Terminal-ipa
          path: build/
